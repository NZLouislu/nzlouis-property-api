name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$SPACE_NAME" ]; then
            echo "❌ Error: Missing required secrets (HF_TOKEN, HF_USERNAME, or HF_SPACE_NAME)"
            exit 1
          fi

          # Ensure we have a clean state and add HF as a remote
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME || git remote set-url hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME

          echo "🚀 Pushing to Hugging Face..."
          git push --force hf HEAD:main

      - name: Verify deployment
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          echo "Deployment completed!"
          echo "Check your Space at: https://huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME"
          echo "API endpoint: https://$HF_USERNAME-$SPACE_NAME.hf.space"
