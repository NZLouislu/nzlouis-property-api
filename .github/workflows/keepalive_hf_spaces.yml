name: Keep HF Spaces Alive

on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:

jobs:
  ping-api:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      HF_SPACES_URL: ${{ secrets.HF_SPACES_API_URL }}

    steps:
      - name: Keep Alive Ping (v2)
        run: |
          if [ -z "$HF_SPACES_URL" ]; then
            echo "❌ Error: HF_SPACES_URL not set"
            exit 1
          fi

          # Ensure URL starts with https://
          URL=$HF_SPACES_URL
          if [[ ! $URL =~ ^http ]]; then
            URL="https://$URL"
          fi
          
          # Remove trailing slash
          URL=${URL%/}

          echo "🔔 Pinging: $URL/health"
          
          # Try main URL
          status=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          echo "Status Code: $status"

          if [ "$status" -eq 200 ]; then
            echo "✅ API is healthy!"
          else
            # Try converting to .hf.space format if it looks like a HF UI URL
            if [[ "$URL" == *"huggingface.co/spaces/"* ]]; then
               parts=($(echo $URL | sed 's/.*\///g'))
               username=$(echo $URL | sed 's/.*spaces\/\([^\/]*\)\/.*/\1/')
               spacename=$(echo $URL | sed 's/.*spaces\/[^\/]*\/\([^\/]*\).*/\1/')
               DIRECT_URL="https://${username,,}-${spacename,,}.hf.space"
               echo "🔄 Retrying with direct URL: $DIRECT_URL/health"
               status=$(curl -s -o /dev/null -w "%{http_code}" "$DIRECT_URL/health")
               echo "Status Code: $status"
               if [ "$status" -eq 200 ]; then
                 echo "✅ Direct API is healthy!"
                 exit 0
               fi
            fi
            echo "❌ All ping attempts failed."
            exit 1
          fi
